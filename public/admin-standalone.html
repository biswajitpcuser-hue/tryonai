<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Admin Panel | TryonAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f0e; --surface: #131a18; --surface2: #1a2421;
      --border: #1f2b27; --text: #e8efec; --text2: #889f97; --text3: #4d635c;
      --green: #08a966; --red: #ff3b4a; --amber: #f5b342; --violet: #8b6cf6;
      --radius: 12px; --radius-sm: 8px;
    }
    html { font-size: 15px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; background: radial-gradient(ellipse at 50% 0%, #0f1a15 0%, var(--bg) 60%);
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 40px 32px; width: 100%; max-width: 380px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-card .logo {
      width: 48px; height: 48px; background: var(--green); border-radius: 14px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
      font-size: 24px; font-weight: 800; color: #fff;
    }
    .login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .login-card p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
    .login-card form { display: flex; flex-direction: column; gap: 12px; }
    .login-card input {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 14px 16px; color: var(--text); font-size: 15px; outline: none;
    }
    .login-card input:focus { border-color: var(--green); }
    .login-card input::placeholder { color: var(--text3); }
    .login-card button[type="submit"] {
      background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm);
      padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .login-card button[type="submit"]:hover { background: #079857; }
    .login-card button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      color: var(--red); font-size: 13px; padding: 8px 12px;
      background: rgba(255,59,74,0.1); border-radius: var(--radius-sm);
    }

    .panel { max-width: 720px; margin: 0 auto; padding: 16px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-left .logo-sm {
      width: 32px; height: 32px; background: var(--green); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
    }
    .topbar-left h1 { font-size: 18px; font-weight: 700; }
    .topbar-left span { color: var(--text2); font-size: 13px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .btn-icon {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text2); cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 16px;
    }
    .btn-icon:hover { border-color: var(--text3); color: var(--text); }
    .btn-logout {
      padding: 8px 16px; border: none; border-radius: var(--radius-sm);
      background: rgba(255,59,74,0.15); color: var(--red); font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    .btn-logout:hover { background: rgba(255,59,74,0.25); }
    .btn-settings {
      padding: 8px 16px; border: none; border-radius: var(--radius-sm);
      background: rgba(139,108,246,0.15); color: var(--violet); font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    .btn-settings:hover { background: rgba(139,108,246,0.25); }

    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px; margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 16px;
    }
    .stat-card .stat-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .stat-value { font-size: 24px; font-weight: 800; margin-top: 4px; }
    .stat-card .stat-value.green { color: var(--green); }
    .stat-card .stat-value.amber { color: var(--amber); }
    .stat-card .stat-value.violet { color: var(--violet); }

    .tabs {
      display: flex; gap: 4px; background: var(--surface);
      border-radius: var(--radius-sm); padding: 4px; margin-bottom: 16px;
    }
    .tabs button {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      background: transparent; color: var(--text2); font-size: 13px;
      font-weight: 500; cursor: pointer;
    }
    .tabs button.active { background: var(--green); color: #fff; }
    .tabs button:not(.active):hover { color: var(--text); }

    .tab-content { display: flex; flex-direction: column; gap: 12px; }

    .add-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px;
    }
    .add-card h3 { font-size: 13px; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .add-row { display: flex; gap: 8px; }
    .add-row input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 11px 14px; color: var(--text);
      font-size: 14px; outline: none;
    }
    .add-row input:focus { border-color: var(--green); }
    .add-row input::placeholder { color: var(--text3); }
    .add-row button {
      padding: 11px 20px; background: var(--green); color: #fff;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .add-row button:hover { background: #079857; }

    .search-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 11px 14px; display: flex;
      align-items: center; gap: 10px; color: var(--text3); font-size: 15px;
    }
    .search-bar input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 14px;
    }
    .search-bar input::placeholder { color: var(--text3); }

    .user-list { display: flex; flex-direction: column; gap: 6px; }
    .user-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .user-row:hover { border-color: #2a3a34; }
    .user-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--text2); flex-shrink: 0;
    }
    .user-details { min-width: 0; }
    .user-details .name { font-size: 14px; font-weight: 600; }
    .user-details .email { font-size: 12px; color: var(--text2); }
    .user-details .meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .user-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .badge {
      padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
    }
    .badge.unlimited { background: rgba(8,169,102,0.15); color: var(--green); }
    .badge.limited { background: rgba(255,59,74,0.12); color: var(--red); }

    .btn-sm {
      padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-sm.unlock { background: var(--green); color: #fff; }
    .btn-sm.revoke { background: rgba(255,59,74,0.15); color: var(--red); }
    .btn-sm.unlock:hover { background: #079857; }
    .btn-sm.revoke:hover { background: rgba(255,59,74,0.25); }
    .btn-sm.remove {
      background: rgba(255,59,74,0.1); color: var(--red); padding: 6px 10px; font-size: 14px;
    }
    .btn-sm.remove:hover { background: rgba(255,59,74,0.2); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; width: 100%; max-width: 400px;
    }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .modal label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }
    .modal input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 11px 14px; color: var(--text);
      font-size: 14px; outline: none; margin-bottom: 12px;
    }
    .modal input:focus { border-color: var(--green); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button {
      padding: 10px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .modal-btns .btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
    .modal-btns .btn-save { background: var(--green); border: none; color: #fff; }
    .modal-btns .btn-cancel:hover { border-color: var(--text3); }
    .modal-btns .btn-save:hover { background: #079857; }

    .toast-container {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 1000; pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 20px; font-size: 14px; color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      opacity: 0; transform: translateY(10px); transition: all 0.3s ease;
      pointer-events: auto; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .loading { text-align: center; padding: 40px; color: var(--text3); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }

    @media (max-width: 480px) {
      .panel { padding: 12px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .user-row { flex-direction: column; align-items: stretch; gap: 10px; }
      .user-actions { justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading"><div class="spinner"></div><p>Loading...</p></div>
  </div>
  <div class="toast-container"><div class="toast" id="toast"></div></div>

  <script>
    // ===== CONFIG =====
    // Is password ko change karein apne hisaab se:
    const ADMIN_PASSWORD = "admin123";
    // ==================

    const STORAGE_KEY = "trx_admin_users";
    const AUTH_KEY = "trx_standalone_auth";

    function $(id) { return document.getElementById(id); }
    function qsa(sel, ctx) { return (ctx||document).querySelectorAll(sel); }

    function toast(msg) {
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function getUsers() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveUsers(users) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    function isAuthed() { return localStorage.getItem(AUTH_KEY) === 'true'; }
    function setAuthed(v) {
      if (v) localStorage.setItem(AUTH_KEY, 'true');
      else localStorage.removeItem(AUTH_KEY);
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    // --- Render ---
    function render() {
      if (!isAuthed()) return renderLogin();
      renderPanel();
    }

    function renderLogin() {
      $('app').innerHTML = `
        <div class="login-page">
          <div class="login-card">
            <div class="logo">T</div>
            <h1>Admin Panel</h1>
            <p>Enter password to manage TryonAI</p>
            <form id="loginForm">
              <input type="password" id="passInput" placeholder="Admin password" required autofocus>
              <div id="loginError" style="display:none" class="login-error"></div>
              <button type="submit" id="loginBtn">Sign In</button>
            </form>
          </div>
        </div>
      `;
      $('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = $('loginBtn');
        const err = $('loginError');
        const pass = $('passInput').value;
        if (pass === ADMIN_PASSWORD) {
          setAuthed(true);
          render();
        } else {
          err.textContent = 'Wrong password';
          err.style.display = 'block';
        }
      });
    }

    function renderPanel() {
      const users = getUsers();
      const unlimitedCount = users.filter(u => u.unlimited).length;

      $('app').innerHTML = `
        <div class="panel">
          <div class="topbar">
            <div class="topbar-left">
              <div class="logo-sm">T</div>
              <div>
                <h1>Admin Panel</h1>
                <span>${users.length} total users</span>
              </div>
            </div>
            <div class="topbar-right">
              <button class="btn-settings" id="settingsBtn">Password</button>
              <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
          </div>

          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-label">Total Users</div>
              <div class="stat-value green">${users.length}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Unlimited</div>
              <div class="stat-value amber">${unlimitedCount}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Limited (5/day)</div>
              <div class="stat-value violet">${users.length - unlimitedCount}</div>
            </div>
          </div>

          <div class="tabs">
            <button class="active" data-tab="users">Users (${users.length})</button>
          </div>

          <div class="tab-content" id="tabContent"></div>
        </div>
      `;

      $('logoutBtn').onclick = () => { setAuthed(false); render(); };
      $('settingsBtn').onclick = renderPasswordModal;
      renderUsersTab(users);
    }

    function renderUsersTab(users) {
      let html = `
        <div class="add-card">
          <h3>Add New User</h3>
          <div class="add-row">
            <input type="email" id="addEmail" placeholder="user@gmail.com" required>
            <button id="addBtn">Add User</button>
          </div>
        </div>
        <div class="search-bar">
          <span>&#x1F50D;</span>
          <input type="text" id="searchInput" placeholder="Search by name or email..." oninput="filterUsers()">
        </div>
        <div class="user-list" id="userList">
      `;

      if (users.length === 0) {
        html += `<div class="empty-state"><div class="empty-icon">&#x1F465;</div><p>No users added yet. Add a user above.</p></div>`;
      } else {
        users.forEach(u => {
          const initial = (u.name || u.email || '?')[0].toUpperCase();
          const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'Just now';
          const remaining = u.unlimited ? 'Unlimited' : `${u.dailyLimit - (u.usedToday || 0)} left today`;
          html += `
            <div class="user-row" data-email="${u.email}" data-name="${(u.name||'').toLowerCase()}" data-email-search="${u.email.toLowerCase()}">
              <div class="user-info">
                <div class="user-avatar">${initial}</div>
                <div class="user-details">
                  <div class="name">${u.name || u.email.split('@')[0]}</div>
                  <div class="email">${u.email}</div>
                  <div class="meta">Joined ${date} &middot; ${remaining}</div>
                </div>
              </div>
              <div class="user-actions">
                <span class="badge ${u.unlimited ? 'unlimited' : 'limited'}">
                  ${u.unlimited ? 'Unlimited' : '5/day'}
                </span>
                <button class="btn-sm ${u.unlimited ? 'revoke' : 'unlock'}"
                  onclick="toggleUnlimited('${u.email}')">
                  ${u.unlimited ? 'Revoke' : 'Unlock'}
                </button>
                <button class="btn-sm remove" onclick="removeUser('${u.email}')">&times;</button>
              </div>
            </div>
          `;
        });
      }
      html += '</div>';
      $('tabContent').innerHTML = html;

      $('addBtn').onclick = () => {
        const email = $('addEmail').value.trim();
        if (!email) return;
        const users = getUsers();
        if (users.find(u => u.email === email)) {
          toast('User already exists');
          return;
        }
        users.unshift({
          id: generateId(),
          email,
          name: email.split('@')[0],
          unlimited: false,
          dailyLimit: 5,
          usedToday: 0,
          lastUsedDate: null,
          createdAt: Date.now(),
        });
        saveUsers(users);
        toast('User added successfully');
        render();
      };
      $('addEmail').addEventListener('keydown', e => { if (e.key === 'Enter') $('addBtn').click(); });
    }

    window.filterUsers = function() {
      const q = ($('searchInput')?.value || '').toLowerCase();
      document.querySelectorAll('.user-row').forEach(row => {
        const match = row.dataset.name.includes(q) || row.dataset.emailSearch.includes(q);
        row.style.display = match ? '' : 'none';
      });
    };

    window.toggleUnlimited = function(email) {
      const users = getUsers();
      const user = users.find(u => u.email === email);
      if (!user) return;
      user.unlimited = !user.unlimited;
      saveUsers(users);
      toast(user.unlimited ? 'Unlimited activated' : 'Unlimited revoked');
      render();
    };

    window.removeUser = function(email) {
      if (!confirm('Remove user ' + email + '?')) return;
      const users = getUsers().filter(u => u.email !== email);
      saveUsers(users);
      toast('User removed');
      render();
    };

    function renderPasswordModal() {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal">
          <h2>Change Admin Password</h2>
          <label>Current password</label>
          <input type="password" id="oldPass" placeholder="Enter current password">
          <label>New password</label>
          <input type="password" id="newPass" placeholder="Enter new password">
          <label>Confirm new password</label>
          <input type="password" id="confirmPass" placeholder="Confirm new password">
          <div class="modal-btns">
            <button class="btn-cancel" id="modalCancel">Cancel</button>
            <button class="btn-save" id="modalSave">Save</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector('#modalCancel').onclick = () => overlay.remove();
      overlay.querySelector('#modalSave').onclick = () => {
        const oldPass = overlay.querySelector('#oldPass').value;
        const newPass = overlay.querySelector('#newPass').value;
        const confirmPass = overlay.querySelector('#confirmPass').value;
        if (oldPass !== ADMIN_PASSWORD) { toast('Current password is wrong'); return; }
        if (newPass.length < 4) { toast('Password must be at least 4 characters'); return; }
        if (newPass !== confirmPass) { toast('Passwords do not match'); return; }
        // Can't actually change const; show instructions
        toast('Password can be changed in the HTML file (line: ADMIN_PASSWORD)');
        overlay.remove();
      };
      overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    }

    // Boot
    render();
  </script>
</body>
</html>
