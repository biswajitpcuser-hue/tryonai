<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | TryonAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f2; color: #17251f; min-height: 100vh;
    }
    .admin-blocked {
      min-height: 100vh; display: grid; place-items: center; padding: 20px; text-align: center;
    }
    .admin-blocked h1 { font-size: 22px; margin-bottom: 8px; }
    .admin-blocked p { color: #6f7a75; font-size: 14px; }
    .admin-login {
      min-height: 100vh; display: grid; place-items: center; padding: 20px;
    }
    .admin-login-card {
      background: #fff; padding: 32px; border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08); width: 100%; max-width: 360px;
      text-align: center;
    }
    .admin-login-card h1 { font-size: 24px; margin-bottom: 8px; }
    .admin-login-card p { color: #6f7a75; font-size: 14px; margin-bottom: 20px; }
    .admin-login-card form { display: flex; flex-direction: column; gap: 12px; }
    .admin-login-card input {
      padding: 12px 16px; border: 1px solid #e0e4e2; border-radius: 8px;
      font-size: 15px; outline: none;
    }
    .admin-login-card input:focus { border-color: #08a966; }
    .admin-login-card button {
      padding: 12px; background: #08a966; color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .admin-login-card button:hover { background: #079457; }
    .admin-error { color: #ff2e39; font-size: 13px; }

    .admin-panel { padding: 20px; max-width: 640px; margin: 0 auto; }
    .admin-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0; border-bottom: 1px solid #e0e4e2; margin-bottom: 16px;
    }
    .admin-header h1 { font-size: 22px; }
    .admin-logout-btn {
      padding: 8px 16px; background: #ff2e39; color: #fff; border: none;
      border-radius: 6px; font-size: 13px; cursor: pointer;
    }
    .admin-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .admin-tabs button {
      padding: 8px 20px; border: 1px solid #e0e4e2; border-radius: 6px;
      background: #fff; font-size: 13px; cursor: pointer;
    }
    .admin-tabs button.active { background: #08a966; color: #fff; border-color: #08a966; }

    .admin-content { display: flex; flex-direction: column; gap: 16px; }
    .admin-add-user {
      background: #fff; padding: 16px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .admin-add-user h3 { font-size: 14px; margin-bottom: 12px; }
    .admin-add-row { display: flex; gap: 8px; }
    .admin-add-row input {
      flex: 1; padding: 10px 14px; border: 1px solid #e0e4e2; border-radius: 6px;
      font-size: 14px; outline: none;
    }
    .admin-add-row input:focus { border-color: #08a966; }
    .admin-add-row button {
      padding: 10px 20px; background: #08a966; color: #fff; border: none;
      border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .admin-user-list { display: flex; flex-direction: column; gap: 8px; }
    .admin-user-row {
      display: flex; justify-content: space-between; align-items: center;
      background: #fff; padding: 14px 16px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .admin-user-info { display: flex; flex-direction: column; gap: 2px; }
    .admin-user-info strong { font-size: 14px; }
    .admin-user-info span { font-size: 12px; color: #6f7a75; }
    .admin-user-info small { font-size: 11px; color: #9aa6a0; }
    .admin-user-actions { display: flex; align-items: center; gap: 10px; }
    .admin-badge {
      padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
    }
    .admin-badge.active { background: #e8f8f1; color: #08a966; }
    .admin-badge:not(.active) { background: #fef0f0; color: #ff2e39; }
    .admin-btn {
      padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px;
      font-weight: 600; cursor: pointer;
    }
    .admin-btn.unlock { background: #08a966; color: #fff; }
    .admin-btn.revoke { background: #ff2e39; color: #fff; }
    .admin-empty { color: #9aa6a0; font-size: 13px; text-align: center; padding: 20px; }
    .admin-history { background: #fff; padding: 16px; border-radius: 8px; }
    .admin-history h3 { font-size: 14px; margin-bottom: 12px; }
    .admin-history-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #f0f3f1;
    }
    .admin-history-row strong { font-size: 13px; }
    .admin-history-row span { font-size: 12px; color: #6f7a75; }
    .admin-history-row small { font-size: 11px; color: #9aa6a0; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    function isMobile() {
      return /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    if (!isMobile()) {
      document.getElementById('app').innerHTML = `
        <div class="admin-blocked">
          <div>
            <h1>Mobile Only</h1>
            <p>Admin panel only works on phone. Open this page on your mobile device.</p>
          </div>
        </div>
      `;
    } else {

    const AUTH_KEY = 'trx_admin_auth';

    function isAuthed() {
      return localStorage.getItem(AUTH_KEY) === 'true';
    }
    function setAuthed(v) {
      if (v) localStorage.setItem(AUTH_KEY, 'true');
      else localStorage.removeItem(AUTH_KEY);
    }

    async function verifyPassword(password) {
      try {
        const res = await fetch('/api/admin/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        return { ok: data.success, error: data.error };
      } catch (err) {
        return { ok: false, error: 'Network error: ' + err.message };
      }
    }

    async function fetchUsers() {
      try {
        const res = await fetch('/api/admin/users');
        const data = await res.json();
        return data.users || [];
      } catch { return []; }
    }

    async function addUserAPI(email) {
      try {
        const res = await fetch('/api/admin/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, displayName: email.split('@')[0] }),
        });
        const data = await res.json();
        return data.user;
      } catch { return null; }
    }

    async function toggleUnlimitedAPI(email, value) {
      try {
        const res = await fetch('/api/admin/users/unlimited', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, value }),
        });
        const data = await res.json();
        return data.user;
      } catch { return null; }
    }

    async function fetchHistory() {
      try {
        const res = await fetch('/api/admin/history');
        const data = await res.json();
        return data.history || [];
      } catch { return []; }
    }

    function render() {
      if (!isAuthed()) return renderLogin();
      renderPanel();
    }

    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="admin-login">
          <div class="admin-login-card">
            <h1>Admin Panel</h1>
            <p>Enter admin password to continue</p>
            <form id="loginForm">
              <input type="password" id="passInput" placeholder="Password" required>
              <span class="admin-error" id="errorMsg"></span>
              <button type="submit">Login</button>
            </form>
          </div>
        </div>
      `;
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pass = document.getElementById('passInput').value;
        const result = await verifyPassword(pass);
        if (result.ok) {
          setAuthed(true);
          render();
        } else {
          document.getElementById('errorMsg').textContent = result.error || 'Wrong password';
        }
      });
    }

    async function renderPanel() {
      const users = await fetchUsers();
      const history = await fetchHistory();
      document.getElementById('app').innerHTML = `
        <div class="admin-panel">
          <header class="admin-header">
            <h1>Admin Panel</h1>
            <button class="admin-logout-btn" id="logoutBtn">Logout</button>
          </header>
          <div class="admin-tabs">
            <button class="active" id="tabUsers">Users (${users.length})</button>
            <button id="tabHistory">History (${history.length})</button>
          </div>
          <div class="admin-content" id="tabContent"></div>
        </div>
      `;

      document.getElementById('logoutBtn').onclick = () => { setAuthed(false); render(); };
      document.getElementById('tabUsers').onclick = () => renderTab('users');
      document.getElementById('tabHistory').onclick = () => renderTab('history');

      renderTab('users');
    }

    async function renderTab(tab) {
      const users = await fetchUsers();
      const history = await fetchHistory();
      const tabs = document.querySelectorAll('.admin-tabs button');
      tabs.forEach(t => t.classList.remove('active'));

      if (tab === 'users') {
        tabs[0].classList.add('active');
        let html = `
          <div class="admin-add-user">
            <h3>Add User</h3>
            <div class="admin-add-row">
              <input type="email" id="addEmail" placeholder="Enter user Gmail" required>
              <button id="addBtn">Add</button>
            </div>
          </div>
          <div class="admin-user-list">
        `;
        if (users.length === 0) {
          html += '<p class="admin-empty">No users yet. Ask users to sign in from the main app.</p>';
        } else {
          users.forEach(u => {
            html += `
              <div class="admin-user-row">
                <div class="admin-user-info">
                  <strong>${u.displayName || 'No name'}</strong>
                  <span>${u.email}</span>
                  <small>Joined ${new Date(u.createdAt).toLocaleDateString()}</small>
                </div>
                <div class="admin-user-actions">
                  <span class="admin-badge ${u.unlimited ? 'active' : ''}">
                    ${u.unlimited ? 'Unlimited' : 'Limited'}
                  </span>
                  <button class="admin-btn ${u.unlimited ? 'revoke' : 'unlock'}"
                    onclick="toggleUnlimited('${u.email}', ${!u.unlimited})">
                    ${u.unlimited ? 'Revoke' : 'Unlimited'}
                  </button>
                </div>
              </div>
            `;
          });
        }
        html += '</div>';
        document.getElementById('tabContent').innerHTML = html;

        document.getElementById('addBtn').onclick = async () => {
          const email = document.getElementById('addEmail').value.trim();
          if (!email) return;
          const user = await addUserAPI(email);
          if (user) renderTab('users');
          else alert('Failed to add user');
        };
      } else {
        tabs[1].classList.add('active');
        let html = '<div class="admin-history"><h3>Unlimited Activation History</h3>';
        if (history.length === 0) {
          html += '<p class="admin-empty">No unlimited activations yet.</p>';
        } else {
          history.forEach((entry, i) => {
            html += `
              <div class="admin-history-row">
                <strong>${entry.email}</strong>
                <span>Unlimited activated</span>
                <small>${new Date(entry.activatedAt).toLocaleString()}</small>
              </div>
            `;
          });
        }
        html += '</div>';
        document.getElementById('tabContent').innerHTML = html;
      }
    }

    window.toggleUnlimited = async function(email, value) {
      const user = await toggleUnlimitedAPI(email, value);
      if (user) renderTab('users');
    };

    render();

    }
  </script>
</body>
</html>
